<f-template name="fluent-spinner" shadowrootmode="open">
  <template>
    {{styles}}
    <slot name="indicator">
      <div class="background"></div>
      <div class="progress">
        <div class="spinner">
          <div class="start">
            <div class="indicator"></div>
          </div>
          <div class="end">
            <div class="indicator"></div>
          </div>
        </div>
      </div>
    </slot>
  </template>
</f-template>
