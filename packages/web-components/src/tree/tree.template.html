<f-template name="fluent-tree" shadowrootmode="open">
  <template
    focusgroup="menu inline block nowrap nomemory"
    @click="{clickHandler($e)}"
    @keydown="{keydownHandler($e)}"
    @change="{changeHandler($e)}"
    @toggle="{itemToggleHandler()}"
  >
    {{styles}}
    <slot f-ref="{defaultSlot}" @slotchange="{handleDefaultSlotChange()}"></slot>
  </template>
</f-template>
