<f-template name="fluent-radio-group" shadowrootmode="open">
  <template
    focusgroup="radiogroup wrap"
    @disabled="{disabledRadioHandler($e)}"
    @change="{changeHandler($e)}"
    @click="{clickHandler($e)}"
    @focusin="{focusinHandler($e)}"
    @keydown="{keydownHandler($e)}"
  >
    {{styles}}
    <slot f-slotted="{slottedRadios}"></slot>
  </template>
</f-template>
