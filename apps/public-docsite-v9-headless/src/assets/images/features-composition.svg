<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <rect width="240" height="160" fill="#fff1f3"/>

  <!-- Parent block -->
  <rect x="24" y="20" width="192" height="120" rx="8" fill="white" stroke="#9b1f5a" stroke-width="2"/>
  <rect x="36" y="32" width="56" height="7" rx="3.5" fill="#9b1f5a" opacity="0.3"/>

  <!-- Child slot A -->
  <rect x="36" y="50" width="80" height="40" rx="6" fill="#fff1f3" stroke="#9b1f5a" stroke-width="1.5"/>
  <rect x="46" y="62" width="40" height="5" rx="2.5" fill="#9b1f5a" opacity="0.5"/>
  <rect x="46" y="73" width="55" height="5" rx="2.5" fill="#9b1f5a" opacity="0.3"/>

  <!-- Child slot B -->
