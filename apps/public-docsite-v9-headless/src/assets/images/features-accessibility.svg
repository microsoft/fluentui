<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <rect width="240" height="160" fill="#fff1f3"/>

  <!-- Focus ring around a button -->
  <rect x="72" y="56" width="96" height="38" rx="8" fill="#9b1f5a"/>
  <rect x="64" y="48" width="112" height="54" rx="12" stroke="#9b1f5a" stroke-width="2.5" stroke-dasharray="6 3" fill="none"/>
  <!-- Button label -->
  <rect x="92" y="71" width="56" height="8" rx="4" fill="white" opacity="0.85"/>

  <!-- ARIA tooltip -->
  <rect x="120" y="18" width="96" height="24" rx="6" fill="white" stroke="#e4e4e7" stroke-width="1.5"/>
  <rect x="130" y="26" width="50" height="5" rx="2.5" fill="#9b1f5a" opacity="0.45"/>
  <rect x="130" y="34" width="70" height="5" rx="2.5" fill="#e4e4e7"/>
  <!-- Tooltip tail -->
  <path d="M148 42 L140 50 L156 42 Z" fill="white" stroke="#e4e4e7" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Keyboard key tab -->
  <rect x="28" y="116" width="40" height="26" rx="5" fill="white" stroke="#9b1f5a" stroke-width="1.5"/>
  <text x="48" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#9b1f5a">Tab</text>

  <!-- Arrow keys -->
  <rect x="78" y="116" width="26" height="26" rx="5" fill="white" stroke="#e4e4e7" stroke-width="1.5"/>
  <path d="M91 130 L91 122 M87 126 L91 122 L95 126" stroke="#9b1f5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="110" y="116" width="26" height="26" rx="5" fill="white" stroke="#e4e4e7" stroke-width="1.5"/>
  <path d="M123 122 L123 130 M119 126 L123 130 L127 126" stroke="#9b1f5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Enter key -->
  <rect x="146" y="116" width="48" height="26" rx="5" fill="#9b1f5a" opacity="0.12" stroke="#9b1f5a" stroke-width="1.5"/>
  <text x="170" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#9b1f5a">Enter</text>

  <!-- WCAG badge -->
  <rect x="28" y="20" width="72" height="20" rx="10" fill="#9b1f5a"/>
  <text x="64" y="33" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">WCAG 2.1 AA</text>
</svg>
