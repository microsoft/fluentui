<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf2f6"/>
      <stop offset="100%" stop-color="#fff8f0"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fdf8fa"/>
    </linearGradient>
    <linearGradient id="resultGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b1f5a"/>
      <stop offset="100%" stop-color="#7a1a4a"/>
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#9b1f5a" flood-opacity="0.1"/>
    </filter>
    <filter id="resultShadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#9b1f5a" flood-opacity="0.25"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#9b1f5a" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="400" fill="url(#bg)"/>
  <rect width="960" height="400" fill="url(#dots)"/>
  <!-- Soft glow blobs -->
  <circle cx="120" cy="340" r="140" fill="#9b1f5a" opacity="0.035"/>
  <circle cx="840" cy="60" r="160" fill="#9b1f5a" opacity="0.03"/>

  <!-- ══════════════════════════════════════
       CARD 1: Styles
  ══════════════════════════════════════ -->
  <rect x="60" y="80" width="200" height="240" rx="16" fill="url(#cardGrad1)" filter="url(#cardShadow)" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Card header -->
  <rect x="60" y="80" width="200" height="40" rx="16" fill="#f7f7f8"/>
  <rect x="60" y="104" width="200" height="16" fill="#f7f7f8"/>
  <circle cx="82" cy="100" r="5" fill="#f87171" opacity="0.65"/>
  <circle cx="97" cy="100" r="5" fill="#fbbf24" opacity="0.65"/>
  <circle cx="112" cy="100" r="5" fill="#4ade80" opacity="0.65"/>
  <rect x="125" y="89" width="90" height="16" rx="3" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <rect x="131" y="95" width="52" height="4" rx="2" fill="#e4e4e7"/>

  <!-- CSS code lines -->
  <!-- .button { -->
  <rect x="76" y="132" width="28" height="6" rx="3" fill="#9b1f5a" opacity="0.55"/>
  <rect x="110" y="132" width="44" height="6" rx="3" fill="#d4527a" opacity="0.4"/>
  <rect x="160" y="132" width="12" height="6" rx="3" fill="#a1a1aa" opacity="0.35"/>
  <!--   color: -->
  <rect x="88" y="148" width="32" height="5" rx="2.5" fill="#a1a1aa" opacity="0.5"/>
  <rect x="126" y="148" width="48" height="5" rx="2.5" fill="#9b1f5a" opacity="0.6"/>
  <!-- color swatch -->
  <rect x="176" y="146" width="10" height="10" rx="2" fill="#9b1f5a" opacity="0.9"/>
  <!--   padding: -->
  <rect x="88" y="163" width="40" height="5" rx="2.5" fill="#a1a1aa" opacity="0.5"/>
  <rect x="134" y="163" width="36" height="5" rx="2.5" fill="#d4527a" opacity="0.4"/>
  <!--   border-radius: -->
  <rect x="88" y="178" width="64" height="5" rx="2.5" fill="#a1a1aa" opacity="0.5"/>
  <rect x="158" y="178" width="18" height="5" rx="2.5" fill="#d4527a" opacity="0.4"/>
  <!-- highlighted line -->
  <rect x="72" y="193" width="168" height="16" rx="4" fill="#9b1f5a" opacity="0.06"/>
  <rect x="88" y="197" width="48" height="5" rx="2.5" fill="#a1a1aa" opacity="0.5"/>
  <rect x="142" y="197" width="52" height="5" rx="2.5" fill="#9b1f5a" opacity="0.5"/>
  <!-- } -->
  <rect x="76" y="213" width="10" height="5" rx="2.5" fill="#a1a1aa" opacity="0.35"/>
  <!-- blank -->
  <!-- .icon { -->
  <rect x="76" y="228" width="28" height="5" rx="2.5" fill="#9b1f5a" opacity="0.45"/>
  <rect x="110" y="228" width="32" height="5" rx="2.5" fill="#d4527a" opacity="0.35"/>
  <!--   font-size: -->
  <rect x="88" y="243" width="44" height="5" rx="2.5" fill="#a1a1aa" opacity="0.5"/>
  <rect x="138" y="243" width="28" height="5" rx="2.5" fill="#d4527a" opacity="0.4"/>
  <!-- } -->
  <rect x="76" y="258" width="10" height="5" rx="2.5" fill="#a1a1aa" opacity="0.35"/>
  <rect x="76" y="272" width="100" height="5" rx="2.5" fill="#e4e4e7" opacity="0.6"/>
  <rect x="76" y="287" width="72" height="5" rx="2.5" fill="#e4e4e7" opacity="0.4"/>

  <!-- Label -->
  <text x="160" y="342" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#52525b">Styles</text>

  <!-- ══════════════════════════════════════
       OPERATOR: +
  ══════════════════════════════════════ -->
  <text x="296" y="213" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="48" font-weight="300" fill="#9b1f5a" opacity="0.5">+</text>

  <!-- ══════════════════════════════════════
       CARD 2: Headless Components
  ══════════════════════════════════════ -->
  <rect x="332" y="80" width="200" height="240" rx="16" fill="url(#cardGrad1)" filter="url(#cardShadow)" stroke="#9b1f5a" stroke-width="1.5"/>

  <!-- "Headless" pill at top -->
  <rect x="374" y="62" width="116" height="24" rx="12" fill="#9b1f5a"/>
  <text x="432" y="78" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600" fill="white" letter-spacing="0.03em">HEADLESS</text>

  <!-- Component tree visualization -->
  <!-- Root node -->
  <rect x="382" y="100" width="156" height="30" rx="8" fill="#fff1f3" stroke="#9b1f5a" stroke-width="1.5"/>
  <rect x="392" y="109" width="8" height="8" rx="2" fill="#9b1f5a" opacity="0.5"/>
  <rect x="406" y="111" width="60" height="5" rx="2.5" fill="#9b1f5a" opacity="0.4"/>
  <text x="526" y="119" text-anchor="end" font-family="monospace" font-size="8" fill="#9b1f5a" opacity="0.6">root</text>

  <!-- Connector lines -->
  <line x1="432" y1="130" x2="432" y2="148" stroke="#9b1f5a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <line x1="432" y1="148" x2="400" y2="148" stroke="#9b1f5a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <line x1="432" y1="148" x2="500" y2="148" stroke="#9b1f5a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <line x1="400" y1="148" x2="400" y2="158" stroke="#9b1f5a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <line x1="500" y1="148" x2="500" y2="158" stroke="#9b1f5a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>

  <!-- Child nodes -->
  <rect x="362" y="158" width="88" height="28" rx="7" fill="#fff1f3" stroke="#9b1f5a" stroke-width="1.5" stroke-dasharray="5 2"/>
  <rect x="372" y="166" width="8" height="8" rx="2" fill="#9b1f5a" opacity="0.4"/>
  <rect x="384" y="168" width="40" height="4" rx="2" fill="#9b1f5a" opacity="0.35"/>
  <text x="440" y="176" text-anchor="end" font-family="monospace" font-size="7" fill="#9b1f5a" opacity="0.5">icon?</text>

  <rect x="462" y="158" width="88" height="28" rx="7" fill="#fff1f3" stroke="#9b1f5a" stroke-width="1.5" stroke-dasharray="5 2"/>
  <rect x="472" y="166" width="8" height="8" rx="2" fill="#9b1f5a" opacity="0.4"/>
  <rect x="484" y="168" width="48" height="4" rx="2" fill="#9b1f5a" opacity="0.35"/>
  <text x="540" y="176" text-anchor="end" font-family="monospace" font-size="7" fill="#9b1f5a" opacity="0.5">label</text>

  <!-- Separator -->
  <line x1="352" y1="206" x2="512" y2="206" stroke="#f2f2f4" stroke-width="1"/>

  <!-- Behavior pills -->
  <rect x="356" y="216" width="70" height="20" rx="10" fill="#9b1f5a" opacity="0.1" stroke="#9b1f5a" stroke-width="1"/>
  <text x="391" y="229" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="9" fill="#9b1f5a">keyboard</text>

  <rect x="434" y="216" width="44" height="20" rx="10" fill="#9b1f5a" opacity="0.1" stroke="#9b1f5a" stroke-width="1"/>
  <text x="456" y="229" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="9" fill="#9b1f5a">aria</text>

  <rect x="356" y="242" width="38" height="20" rx="10" fill="#9b1f5a" opacity="0.1" stroke="#9b1f5a" stroke-width="1"/>
  <text x="375" y="255" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="9" fill="#9b1f5a">focus</text>

  <rect x="400" y="242" width="56" height="20" rx="10" fill="#9b1f5a" opacity="0.1" stroke="#9b1f5a" stroke-width="1"/>
  <text x="428" y="255" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="9" fill="#9b1f5a">state</text>

  <rect x="462" y="242" width="52" height="20" rx="10" fill="#9b1f5a" opacity="0.1" stroke="#9b1f5a" stroke-width="1"/>
  <text x="488" y="255" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="9" fill="#9b1f5a">events</text>

  <rect x="356" y="268" width="158" height="20" rx="10" fill="#9b1f5a" opacity="0.1" stroke="#9b1f5a" stroke-width="1"/>
  <text x="435" y="281" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="9" fill="#9b1f5a">wcag 2.1 aa</text>

  <!-- Label -->
  <text x="432" y="342" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#52525b">Headless Components</text>

  <!-- ══════════════════════════════════════
       OPERATOR: =
  ══════════════════════════════════════ -->
  <text x="568" y="213" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="48" font-weight="300" fill="#9b1f5a" opacity="0.5">=</text>

  <!-- ══════════════════════════════════════
       CARD 3: Your Design System (result)
  ══════════════════════════════════════ -->
  <rect x="604" y="60" width="300" height="280" rx="18" fill="url(#resultGrad)" filter="url(#resultShadow)"/>
  <!-- Subtle inner pattern -->
  <rect x="604" y="60" width="300" height="280" rx="18" fill="url(#dots)" opacity="0.3"/>

  <!-- Browser chrome inside card -->
  <rect x="624" y="84" width="260" height="236" rx="10" fill="white" opacity="0.97"/>

  <!-- Browser title bar -->
  <rect x="624" y="84" width="260" height="28" rx="10" fill="#f7f7f8"/>
  <rect x="624" y="98" width="260" height="14" fill="#f7f7f8"/>
  <circle cx="641" cy="98" r="4" fill="#f87171" opacity="0.6"/>
  <circle cx="654" cy="98" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="667" cy="98" r="4" fill="#4ade80" opacity="0.6"/>
  <rect x="678" y="90" width="146" height="14" rx="3" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <rect x="684" y="95" width="70" height="4" rx="2" fill="#e4e4e7"/>

  <!-- Nav -->
  <rect x="636" y="122" width="236" height="22" rx="5" fill="#f7f7f8"/>
  <rect x="646" y="130" width="24" height="5" rx="2.5" fill="#9b1f5a" opacity="0.7"/>
  <rect x="676" y="130" width="20" height="5" rx="2.5" fill="#a1a1aa" opacity="0.4"/>
  <rect x="702" y="130" width="24" height="5" rx="2.5" fill="#a1a1aa" opacity="0.4"/>
  <rect x="800" y="126" width="60" height="14" rx="7" fill="#9b1f5a"/>
  <rect x="813" y="131" width="36" height="4" rx="2" fill="white" opacity="0.8"/>

  <!-- Hero text -->
  <rect x="636" y="156" width="120" height="9" rx="4.5" fill="#0a0a0a" opacity="0.75"/>
  <rect x="636" y="171" width="94" height="7" rx="3.5" fill="#0a0a0a" opacity="0.4"/>
  <rect x="636" y="184" width="108" height="7" rx="3.5" fill="#0a0a0a" opacity="0.25"/>

  <!-- Buttons -->
  <rect x="636" y="202" width="76" height="24" rx="7" fill="#9b1f5a"/>
  <rect x="652" y="211" width="44" height="5" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="720" y="202" width="76" height="24" rx="7" fill="white" stroke="#9b1f5a" stroke-width="1.5"/>
  <rect x="735" y="211" width="46" height="5" rx="2.5" fill="#9b1f5a" opacity="0.7"/>

  <!-- Cards row -->
  <rect x="636" y="238" width="110" height="72" rx="8" fill="#f7f7f8"/>
  <rect x="646" y="248" width="90" height="30" rx="5" fill="#e4e4e7" opacity="0.5"/>
  <rect x="646" y="284" width="60" height="5" rx="2.5" fill="#a1a1aa" opacity="0.5"/>
  <rect x="646" y="295" width="78" height="4" rx="2" fill="#a1a1aa" opacity="0.3"/>

  <!-- Active card with focus ring -->
  <rect x="758" y="238" width="110" height="72" rx="8" fill="white" stroke="#9b1f5a" stroke-width="1.5"/>
  <rect x="753" y="233" width="120" height="82" rx="11" stroke="#9b1f5a" stroke-width="2" stroke-dasharray="4 3" fill="none" opacity="0.4"/>
  <rect x="768" y="248" width="90" height="30" rx="5" fill="#fff1f3"/>
  <rect x="768" y="284" width="60" height="5" rx="2.5" fill="#9b1f5a" opacity="0.4"/>
  <rect x="768" y="295" width="78" height="4" rx="2" fill="#9b1f5a" opacity="0.25"/>

  <!-- Label -->
  <text x="754" y="366" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#9b1f5a">Your Design System</text>
</svg>
