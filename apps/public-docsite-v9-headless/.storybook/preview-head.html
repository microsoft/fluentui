<style type="text/tailwindcss">

<!--
  Tailwind's Preflight is omitted above because it resets h1/h2/p/a in
  MDX docs (which rely on typography from react-storybook-addon/src/styles.css).

  `.docs-story` so rendered Canvas examples get border/box-sizing/form-element
  normalization without affecting the surrounding MDX page. -->
<style>
  @layer base {
    @scope (.docs-story) {
      *,
      ::before,
      ::after,
      ::backdrop,
      ::file-selector-button {
        box-sizing: border-box;
        border: 0 solid currentColor;
      }

      img,
      svg,
      video,
      canvas,
      audio,
      iframe,
      embed,
      object {
        display: block;
        vertical-align: middle;
      }

      img,
      video {
        max-width: 100%;
        height: auto;
      }

      button,
      input,
      optgroup,
      select,
      textarea,
      ::file-selector-button {
        font-family: inherit;
        font-feature-settings: inherit;
        font-variation-settings: inherit;
        font-size: 100%;
        font-weight: inherit;
        line-height: inherit;
        letter-spacing: inherit;
        color: inherit;
      }

      button,
      select {
        text-transform: none;
      }

      button,
      input:where([type='button'], [type='reset'], [type='submit']),
      ::file-selector-button {
        appearance: button;
        background-color: transparent;
        background-image: none;
      }

      :-moz-focusring {
        outline: auto;
      }

      ::placeholder {
        opacity: 1;
        color: color-mix(in oklab, currentColor 50%, transparent);
      }

      textarea {
        resize: vertical;
      }

      ol,
      ul,
      menu {
        list-style: none;
      }

      [hidden]:where(:not([hidden='until-found'])) {
        display: none !important;
      }
    }
  }
</style>
