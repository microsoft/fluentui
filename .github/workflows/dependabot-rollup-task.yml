name: Dependabot rollup task

on:
  schedule:
    # Mondays at 15:00 UTC
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      base_branch:
        description: Target base branch
        required: false
        default: master
      max_prs:
        description: Maximum Dependabot PRs to include in one rollup task
        required: false
        default: '11'

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  create-rollup-task:
    if: ${{ github.repository_owner == 'microsoft' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_BRANCH: ${{ inputs.base_branch || 'master' }}
      MAX_PRS: ${{ inputs.max_prs || '11' }}
    steps:
      - name: Build Dependabot rollup task
        id: build-task
        shell: bash
        run: |
          set -euo pipefail

          prs_json=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --search "is:open author:app/dependabot label:dependencies base:${BASE_BRANCH}" \
            --limit 200 \
            --json number,title,url,updatedAt)

          selected=$(echo "$prs_json" | jq --argjson max "$MAX_PRS" 'sort_by(.updatedAt) | .[:$max]')
          selected_count=$(echo "$selected" | jq 'length')

          if [[ "$selected_count" -eq 0 ]]; then
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "No open Dependabot PRs found for base branch '${BASE_BRANCH}'."
            exit 0
          fi

          issue_title="Dependabot rollup task (${BASE_BRANCH}) - $(date -u +%Y-%m-%d)"

          issue_body_file=$(mktemp)

          {
            echo "## Dependabot Rollup Task"
            echo
            echo "This task was generated automatically to keep Dependabot updates reviewable in a capped batch."
            echo
            echo "- Base branch: ${BASE_BRANCH}"
            echo "- Batch size: ${selected_count} (max configured: ${MAX_PRS})"
            echo "- Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "### Candidate PRs"
            echo
            echo "$selected" | jq -r '.[] | "- [ ] #\(.number) - [\(.title)](\(.url))"'
            echo
            echo "### Suggested Aggregate PR Title"
            echo
            echo "chore(deps): aggregate ${selected_count} open Dependabot PRs"
            echo
            echo "### Suggested Supersedes Block"
            echo
            echo "Supersedes and closes:"
            echo "$selected" | jq -r '.[] | "- #\(.number)"'
          } > "$issue_body_file"

          echo "has_work=true" >> "$GITHUB_OUTPUT"
          echo "issue_title=$issue_title" >> "$GITHUB_OUTPUT"
          echo "issue_body_file=$issue_body_file" >> "$GITHUB_OUTPUT"

      - name: Create or update rollup task issue
        if: ${{ steps.build-task.outputs.has_work == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          issue_title='${{ steps.build-task.outputs.issue_title }}'
          issue_body_file='${{ steps.build-task.outputs.issue_body_file }}'

          existing_issue_number=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "in:title \"${issue_title}\"" \
            --json number,title \
            --jq 'map(select(.title == "'"${issue_title}"'")) | .[0].number // empty')

          if [[ -n "$existing_issue_number" ]]; then
            gh issue edit "$existing_issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file "$issue_body_file"
            echo "Updated existing issue #${existing_issue_number}".
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$issue_title" \
              --body-file "$issue_body_file" \
              --label dependencies
            echo "Created new rollup task issue: ${issue_title}".
          fi
