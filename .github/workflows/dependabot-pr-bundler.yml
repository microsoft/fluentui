name: Dependabot PR Bundler

on:
  schedule:
    - cron: '38 5 * * 1'
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch to bundle against'
        required: false
        default: 'master'
        type: string
      max_prs:
        description: 'Maximum Dependabot PRs to bundle'
        required: false
        default: '11'
        type: string
      dry_run:
        description: 'Print the bundle plan without creating a PR'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dependabot-pr-bundler-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    if: ${{ github.repository_owner == 'microsoft' }}
    runs-on: macos-14-xlarge
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          node-version: '22'

      - name: Bundle open Dependabot PRs
        env:
          BASE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_branch || 'master' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_PRS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_prs || '11' }}
        run: node ./scripts/dependabot-pr-bundler.cjs
